{% extends "base.html" %}

{% block content %}
<!-- 1. 添加管理员卡片 -->
<div class="form-card">
    <h1 class="page-title"><i class="fas fa-user-shield"></i> 添加管理员</h1>
    
    <form method="POST" class="project-form">
        <div class="form-group">
            <label for="username" class="form-label">
                用户名 <span class="required-star">*</span>
            </label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入新管理员账号" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">
                密码 <span class="required-star">*</span>
            </label>
            <div class="password-input-wrapper">
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入登录密码" required>
                <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility()" title="显示/隐藏密码">
                    <i id="passwordToggleIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <!-- 按钮组（包含返回按钮，方便操作） -->
        <div class="button-group" style="margin-top: 10px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> 确认添加
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回控制台
            </a>
        </div>
    </form>
</div>

<!-- 2. 现有管理员列表卡片 -->
<div class="form-card" style="margin-top: 30px;">
    <h2 class="section-title" style="margin-top: 0; margin-bottom: 18px; font-size: 1.25em;">
        <i class="fas fa-users-cog"></i> 现有管理员账号
    </h2>
    
    <div class="table-responsive">
        <table class="custom-table">
            <thead>
                <tr>
                    <th><i class="fas fa-user"></i> 用户名</th>
                    <th><i class="far fa-clock"></i> 创建时间</th>
                </tr>
            </thead>
            <tbody>
                {% for admin in admins %}
                    <tr>
                        <td class="font-weight-500">{{ admin[1] }}</td>
                        <td class="text-muted">{{ admin[3] }}</td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="2" class="text-center text-muted" style="padding: 20px;">
                            暂无其他管理员记录
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    // 开关密码可见性
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('passwordToggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
