{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h1 class="page-title">编辑项目</h1>
    
    <form method="POST" enctype="multipart/form-data" class="project-form">
        <div class="form-group">
            <label for="title" class="form-label">
                项目标题 <span class="required-star">*</span>
            </label>
            <input type="text" id="title" name="title" value="{{ project.title }}" class="form-input" placeholder="请输入项目名称" required>
        </div>
        
        <div class="form-group">
            <label for="description" class="form-label">项目描述</label>
            <textarea id="description" name="description" rows="4" class="form-textarea" placeholder="选填，记录一下创作灵感或详细说明...">{{ project.description }}</textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group flex-1">
                <label for="category" class="form-label">
                    分类 <span class="required-star">*</span>
                </label>
                <select id="category" name="category" class="form-select" required>
                    <option value="knitting" {% if project.category == 'knitting' %}selected{% endif %}>🧶 针织类</option>
                    <option value="crafting" {% if project.category == 'crafting' %}selected{% endif %}>✂️ 手工类</option>
                </select>
            </div>
            
            <div class="form-group flex-1">
                <label for="status" class="form-label">
                    状态 <span class="required-star">*</span>
                </label>
                <select id="status" name="status" class="form-select" required onchange="toggleCompletedDate()">
                    <option value="排队中" {% if project.status == '排队中' %}selected{% endif %}>⏳ 排队中</option>
                    <option value="制作中" {% if project.status == '制作中' %}selected{% endif %}>🔨 制作中</option>
                    <option value="已完成" {% if project.status == '已完成' %}selected{% endif %}>✅ 已完成</option>
                </select>
            </div>
        </div>

        <div id="completedDateContainer" class="form-group hidden-field">
            <label for="completed_at" class="form-label" id="dateLabel">
                时间 <span class="form-hint">(选填)</span>
            </label>
            <<input type="date" id="completed_at" name="completed_at" class="form-input"
                   value="{% if project %}{{ ((project.completed_at or project.created_at or '') | string)[:10] }}{% endif %}"
                   data-created-at="{% if project and project.created_at %}{{ (project.created_at | string)[:10] }}{% endif %}"
                   data-completed-at="{% if project and project.completed_at %}{{ (project.completed_at | string)[:10] }}{% endif %}">
        </div>
        
        <div class="form-group">
            <label class="form-label">项目图片</label>
            
            {% if project.image_path %}
                <div id="currentImageContainer" class="image-preview-box">
                    <span class="preview-title">当前使用图片：</span>
                    <img src="{{ url_for('static', filename=project.image_path) }}" alt="{{ project.title }}">
                </div>
            {% endif %}

            <div class="file-upload-wrapper" style="margin-top: 8px;">
                <label for="image" class="file-upload-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span id="file-label-text">
                        {% if project.image_path %}点击重新上传图片以覆盖原图{% else %}点击选择或拖拽图片文件{% endif %}
                    </span>
                </label>
                <input type="file" id="image" name="image" accept="image/*" class="file-input" onchange="previewSelectedImage(this)">
            </div>
            
            <div id="imagePreviewContainer" class="image-preview-box hidden-field">
                <span class="preview-title">即将替换的新图片预览：</span>
                <img id="imagePreview" src="" alt="新选中图片预览">
            </div>
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存更新
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回控制台
            </a>
        </div>
    </form>
</div>

<script>
    function getTodayDateString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function toggleCompletedDate() {
        const statusEl = document.getElementById('status');
        const completedDateContainer = document.getElementById('completedDateContainer');
        const completedAtInput = document.getElementById('completed_at');
        const dateLabel = document.getElementById('dateLabel');

        if (!statusEl || !completedDateContainer || !completedAtInput) return;

        const val = statusEl.value ? statusEl.value.trim() : '';

        const createdAt = completedAtInput.getAttribute('data-created-at');
        const completedAt = completedAtInput.getAttribute('data-completed-at');
        
        if (val === '制作中') {
            completedDateContainer.classList.remove('hidden-field');
            completedDateContainer.style.display = 'block';
            
            if (dateLabel) {
                dateLabel.innerHTML = '开始时间 <span class="form-hint">(选填)</span>';
            }

            if (createdAt && createdAt.trim() !== '') {
                completedAtInput.value = createdAt.trim();
            } else {
                completedAtInput.value = getTodayDateString();
            }
        } else if (val === '已完成') {
            completedDateContainer.classList.remove('hidden-field');
            completedDateContainer.style.display = 'block';
            if (dateLabel) {
                dateLabel.innerHTML = '完成时间 <span class="form-hint">(选填)</span>';
            }
            if (completedAt && completedAt.trim() !== '') {
                completedAtInput.value = completedAt.trim();
            } else {
                completedAtInput.value = getTodayDateString();
            }
        } else {
            completedDateContainer.classList.add('hidden-field');
            completedDateContainer.style.display = 'none';
        }
    }

    function previewSelectedImage(input) {
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previewImage = document.getElementById('imagePreview');
        const labelText = document.getElementById('file-label-text');

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                previewContainer.classList.remove('hidden-field');
            }
            reader.readAsDataURL(input.files[0]);
            labelText.textContent = `已选择新图片: ${input.files[0].name}`;
        } else {
            previewImage.src = '';
            previewContainer.classList.add('hidden-field');
            labelText.textContent = "{% if project.image_path %}点击重新上传图片以覆盖原图{% else %}点击选择或拖拽图片文件{% endif %}";
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        toggleCompletedDate();
    });
</script>
{% endblock %}
